[build]
  publish = "."

# Clean URL redirects — Netlify serves /library → library.html automatically.
# These handle edge cases.

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/shop"
  to = "/library"
  status = 301

[[redirects]]
  from = "/books"
  to = "/library"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
